name: Run API Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST
    - cron: '30 13 * * *'  # 7:00 PM IST

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run Collection
        run: |
          newman run 'phoenix.postman_collection.json' \
            -e qa.postman_environment.json \
            -r cli,htmlextra \
            -d phoenix.csv  \
            --reporter-htmlextra-export newman/index.html

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: newman-html-report
          path: newman/*.html
         
      - name: Creating GitHub Pages branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: Sending email notifications
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL }}
          password: ${{ secrets.PASSWORD }}
          to: abishekh01112000@gmail.com
          from: ${{ secrets.EMAIL }}
          subject: Phoenix-Inwarranty-Flow-Collection-Run-Report
          body: |
            Hello,
            The Phoenix Inwarranty Flow Postman Collection execution has completed.
            Please find the attached link : https://ndivyapriya18.github.io/phoenix-inwarrenty-flow/
            Regards,
            GH Actions!
          
      
          
